{% extends "base.html" %}
{% block title %}找回密码 - 源网荷储一体化计算平台{% endblock %}
{% block content %}
<div class="form-container">
    <h2 class="form-title">找回密码</h2>
    <p class="form-subtitle">输入注册手机号，短信验证后重置密码</p>
    
    {% if errors %}
    <div class="form-error">
        {% for err in errors %}
        <p>⚠ {{ err }}</p>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="form-group">
            <label for="phone">注册手机号</label>
            <div class="input-with-btn">
                <input type="tel" id="phone" name="phone" 
                       value="{{ phone or '' }}"
                       placeholder="请输入注册时使用的手机号" 
                       pattern="[0-9]{11}" maxlength="11" required autofocus>
                <button type="button" class="btn-send-code" id="btnSendCode" onclick="sendCode()">获取验证码</button>
            </div>
        </div>
        
        <div class="form-group">
            <label for="verify_code">短信验证码</label>
            <input type="text" id="verify_code" name="verify_code" 
                   placeholder="请输入6位验证码" maxlength="6" required>
        </div>
        
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" 
                   placeholder="请输入新密码（至少6位）" 
                   minlength="6" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认新密码</label>
            <input type="password" id="confirm_password" name="confirm_password" 
                   placeholder="请再次输入新密码" required>
        </div>
        
        <button type="submit" class="btn-submit">重置密码</button>
    </form>
    
    <p class="form-footer">
        <a href="{{ url_for('login') }}">← 返回登录</a>
    </p>
</div>

<script>
let countdown = 0;
function sendCode() {
    const phone = document.getElementById('phone').value;
    if (phone.length !== 11) { alert('请输入正确的11位手机号'); return; }
    
    const btn = document.getElementById('btnSendCode');
    btn.disabled = true; countdown = 60;
    btn.textContent = countdown + 's后重发';
    let timer = setInterval(() => {
        countdown--;
        btn.textContent = countdown + 's后重发';
        if (countdown <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '获取验证码'; }
    }, 1000);
    
    fetch('/api/send-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({phone: phone})
    })
    .then(r => r.json())
    .then(data => {
        if (data.code) {
            alert('验证码: ' + data.code + '\n（实际部署将发送到手机）');
        } else if (data.error) {
            alert('发送失败: ' + data.error);
        }
    });
}
</script>
{% endblock %}
