{% extends "base.html" %}
{% block title %}荷-储协同优化 - 源网荷储一体化计算平台{% endblock %}
{% block content %}

<!-- ===== 数据文件 ===== -->
<div class="orig-section">
    <div class="orig-section-title">数据文件</div>
    <div class="orig-btn-row">
        <button class="orig-btn orig-btn-file" onclick="alert('下载模板功能开发中')">下载模板</button>
        <button class="orig-btn orig-btn-file" onclick="alert('上传负荷文件功能开发中')">上传负荷文件</button>
        <button class="orig-btn orig-btn-file" onclick="alert('分时电价表格功能开发中')">分时电价表格</button>
        <button class="orig-btn orig-btn-file" onclick="alert('输出文件夹功能开发中')">输出文件夹</button>
    </div>
</div>

<!-- ===== 技术及经济性参数 ===== -->
<div class="orig-section">
    <div class="orig-section-title">技术及经济性参数</div>
    <div class="orig-param-grid col3">
        <div class="orig-field"><label>电池容量(MW)</label><input type="number" id="battery_capacity_mw" value="3" step="0.1"></div>
        <div class="orig-field"><label>单位投资(元/kW)</label><input type="number" id="unit_investment" value="700" step="10"></div>
        <div class="orig-field"><label>年运维费(元)</label><input type="number" id="annual_om_cost" value="42000" step="1000"></div>
        <div class="orig-field"><label>容量电价(元/kW·月)</label><input type="number" id="capacity_price" value="30" step="1"></div>
        <div class="orig-field"><label>充电效率</label><input type="number" id="charge_efficiency" value="0.95" step="0.01"></div>
        <div class="orig-field"><label>放电效率</label><input type="number" id="discharge_efficiency" value="0.95" step="0.01"></div>
        <div class="orig-field"><label>放电深度DOD</label><input type="number" id="dod" value="0.9" step="0.05"></div>
        <div class="orig-field"><label>最大循环次数</label><input type="number" id="cycle_life" value="6000" step="100"></div>
        <div class="orig-field"><label>最大倍率C</label><input type="number" id="max_c_rate" value="0.5" step="0.1"></div>
        <div class="orig-field"><label>折现率</label><input type="number" id="discount_rate" value="0.08" step="0.01"></div>
    </div>
</div>

<!-- ===== 策略选择 ===== -->
<div class="orig-section">
    <div class="orig-section-title">优化策略</div>
    <div class="orig-radio-row">
        <label class="orig-radio"><input type="radio" name="strategy" value="MILP" checked onchange="toggleRollingParams()"> 理想最优(MILP)</label>
        <label class="orig-radio"><input type="radio" name="strategy" value="Hybrid" onchange="toggleRollingParams()"> 混合预测(CNN-LSTM)</label>
        <label class="orig-radio"><input type="radio" name="strategy" value="Transformer" onchange="toggleRollingParams()"> Transformer预测</label>
    </div>
</div>

<!-- ===== 滚动预测参数 ===== -->
<div class="orig-section" id="rollingParams">
    <div class="orig-section-title">滚动预测参数</div>
    <div class="orig-param-grid col4">
        <div class="orig-field"><label>训练集时长(小时)</label><input type="number" id="train_hours" value="336" disabled></div>
        <div class="orig-field"><label>微调间隔(小时)</label><input type="number" id="ft_interval" value="1" disabled></div>
        <div class="orig-field"><label>仿真时长(小时)</label><input type="number" id="sim_hours" value="4380" disabled></div>
        <div class="orig-field"><label>开始时间(小时)</label><input type="number" id="start_hour" value="0" disabled></div>
        <div class="orig-field"><label>预测步长(小时)</label><input type="number" id="pred_len" value="1" disabled></div>
    </div>
</div>

<!-- ===== 控制按钮 ===== -->
<div class="orig-section">
    <div class="orig-ctrl-row">
        <div class="orig-ctrl-btns">
            <button class="orig-btn orig-btn-go" id="btnCalc" onclick="startCompute()">计 算</button>
            <button class="orig-btn orig-btn-pause" id="btnPause" disabled>暂停</button>
            <button class="orig-btn orig-btn-resume" id="btnResume" disabled>继续</button>
            <button class="orig-btn orig-btn-stop" id="btnStop" disabled>结束</button>
        </div>
        <div class="orig-progress-wrap">
            <div class="orig-progress"><div class="orig-progress-fill" id="progFill"></div></div>
            <span class="orig-progress-text" id="progText">就绪</span>
        </div>
    </div>
</div>

<!-- ===== 结果输出 ===== -->
<div class="orig-section">
    <div class="orig-section-title">结果输出</div>
    
    <!-- 经济指标 -->
    <div class="orig-kpi-row col4">
        <div class="orig-kpi"><span class="orig-kpi-label">首年综合盈利(元)</span><span class="orig-kpi-val" id="kpi_profit">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">回收期(年)</span><span class="orig-kpi-val" id="kpi_payback">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">全生命周期盈亏(元)</span><span class="orig-kpi-val" id="kpi_lifecycle">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">电池6000次循环时间(年)</span><span class="orig-kpi-val" id="kpi_life_years">--</span></div>
    </div>
    
    <!-- 图表区 -->
    <div class="orig-charts-row" id="chartsRow" style="display:none;">
        <div class="orig-chart-box">
            <div class="orig-chart-header">
                <span>典型日预测对比</span>
                <select id="monthSelect" onchange="updateCharts()">
                    <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
                    <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
                    <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
                    <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
                </select>
            </div>
            <div class="orig-chart-canvas" id="chartForecast"></div>
        </div>
        <div class="orig-chart-box">
            <div class="orig-chart-header"><span>月度收益分析</span></div>
            <div class="orig-chart-canvas" id="chartMonthly"></div>
        </div>
    </div>
    
    <!-- 下载链接 -->
    <div class="orig-download" id="downloadArea" style="display:none;">
        <a id="downloadLink" href="#" class="orig-btn orig-btn-go">📥 下载计算结果</a>
    </div>
</div>

<style>
/* ===== 原始GUI风格 ===== */
.orig-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
}
.orig-section-title {
    font-size: 0.95rem; font-weight: 700; color: var(--primary-dark);
    margin-bottom: 10px; padding-bottom: 6px; border-bottom: 2px solid #e8f5e9;
}
.orig-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.orig-btn {
    padding: 7px 16px; border: none; border-radius: 5px;
    font-size: 0.82rem; cursor: pointer; font-family: inherit;
    transition: opacity 0.2s;
}
.orig-btn:hover { opacity: 0.85; }
.orig-btn-file { background: #c8e6c9; color: #2e7d32; font-weight: 600; }
.orig-btn-go { background: #81c784; color: #fff; font-weight: 700; font-size: 0.95rem; padding: 8px 24px; }
.orig-btn-pause { background: #ffcc80; color: #e65100; }
.orig-btn-resume { background: #a5d6a7; color: #2e7d32; }
.orig-btn-stop { background: #ef9a9a; color: #c62828; }
.orig-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.orig-param-grid { display: grid; gap: 6px 12px; }
.orig-param-grid.col3 { grid-template-columns: repeat(3, 1fr); }
.orig-param-grid.col4 { grid-template-columns: repeat(4, 1fr); }
.orig-field { display: flex; align-items: center; gap: 6px; }
.orig-field label { font-size: 0.8rem; white-space: nowrap; min-width: fit-content; color: var(--text); }
.orig-field input {
    flex: 1; padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px;
    font-size: 0.82rem; font-family: inherit; min-width: 60px;
}
.orig-field input:disabled { background: #f5f5f5; }

.orig-radio-row { display: flex; gap: 20px; }
.orig-radio { font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.orig-radio input { margin: 0; }

.orig-ctrl-row { display: flex; align-items: center; gap: 16px; }
.orig-ctrl-btns { display: flex; gap: 6px; }
.orig-progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
.orig-progress { flex: 1; height: 18px; background: #e0e0e0; border-radius: 9px; overflow: hidden; }
.orig-progress-fill { height: 100%; width: 0%; background: #81c784; border-radius: 9px; transition: width 0.3s; }
.orig-progress-text { font-size: 0.82rem; color: var(--text-light); min-width: 160px; }

.orig-kpi-row { display: grid; gap: 8px; margin-bottom: 12px; }
.orig-kpi-row.col4 { grid-template-columns: repeat(4, 1fr); }
.orig-kpi {
    text-align: center; padding: 10px 6px;
    background: #f5f5f5; border-radius: 6px; border: 1px solid #e0e0e0;
}
.orig-kpi-label { display: block; font-size: 0.72rem; color: var(--text-light); margin-bottom: 4px; }
.orig-kpi-val { display: block; font-size: 1.1rem; font-weight: 700; color: #2e7d32; }

.orig-charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
.orig-chart-box { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.orig-chart-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; background: #f5f5f5; font-size: 0.82rem; font-weight: 600;
}
.orig-chart-header select { padding: 2px 6px; font-size: 0.78rem; }
.orig-chart-canvas { min-height: 280px; background: #fafafa; padding: 10px; }

.orig-download { text-align: center; margin-top: 12px; }
.orig-download a { text-decoration: none; display: inline-block; }

@media (max-width: 900px) {
    .orig-param-grid.col3, .orig-param-grid.col4 { grid-template-columns: repeat(2, 1fr); }
    .orig-kpi-row.col4 { grid-template-columns: repeat(2, 1fr); }
    .orig-charts-row { grid-template-columns: 1fr; }
}
</style>

<script>
let taskId = null;

function toggleRollingParams() {
    const st = document.querySelector('input[name="strategy"]:checked').value;
    const disabled = st === 'MILP';
    document.querySelectorAll('#rollingParams input').forEach(el => el.disabled = disabled);
}

function collectParams() {
    const st = document.querySelector('input[name="strategy"]:checked').value;
    return {
        strategy: st,
        battery_capacity_mw: +document.getElementById('battery_capacity_mw').value || 3,
        unit_investment: +document.getElementById('unit_investment').value || 700,
        annual_om_cost: +document.getElementById('annual_om_cost').value || 42000,
        capacity_price: +document.getElementById('capacity_price').value || 30,
        charge_efficiency: +document.getElementById('charge_efficiency').value || 0.95,
        discharge_efficiency: +document.getElementById('discharge_efficiency').value || 0.95,
        dod: +document.getElementById('dod').value || 0.9,
        cycle_life: +document.getElementById('cycle_life').value || 6000,
        max_c_rate: +document.getElementById('max_c_rate').value || 0.5,
        discount_rate: +document.getElementById('discount_rate').value || 0.08,
        train_hours: st !== 'MILP' ? (+document.getElementById('train_hours').value || 336) : 336,
        ft_interval: st !== 'MILP' ? (+document.getElementById('ft_interval').value || 1) : 1,
        sim_hours: st !== 'MILP' ? (+document.getElementById('sim_hours').value || 4380) : 8760,
        start_hour: st !== 'MILP' ? (+document.getElementById('start_hour').value || 0) : 0,
        pred_len: st !== 'MILP' ? (+document.getElementById('pred_len').value || 1) : 1,
    };
}

function startCompute() {
    const btn = document.getElementById('btnCalc');
    btn.disabled = true; btn.textContent = '计算中...';
    document.getElementById('btnPause').disabled = false;
    document.getElementById('btnStop').disabled = false;
    document.getElementById('progFill').style.width = '2%';
    document.getElementById('progText').textContent = '启动中...';
    document.getElementById('downloadArea').style.display = 'none';
    ['kpi_profit','kpi_payback','kpi_lifecycle','kpi_life_years'].forEach(id => document.getElementById(id).textContent = '--');

    fetch('/api/compute/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task_type: 's1', params: collectParams()})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert('失败: ' + data.error); resetUI(); return; }
        taskId = data.task_id;
        pollTask();
    })
    .catch(e => { alert('请求失败: ' + e); resetUI(); });
}

function pollTask() {
    if (!taskId) return;
    fetch('/api/task/' + taskId + '/status')
    .then(r => r.json())
    .then(data => {
        document.getElementById('progFill').style.width = (data.progress || 0) + '%';
        let txt = data.status === 'running' ? '计算中...' + (data.progress||0) + '%' :
                  data.status === 'completed' ? '完成' : data.status === 'failed' ? '失败' : '等待中';
        document.getElementById('progText').textContent = txt;
        
        if (data.status === 'completed') {
            resetUI();
            document.getElementById('downloadArea').style.display = 'block';
            document.getElementById('downloadLink').href = '/api/task/' + taskId + '/download';
            showResults();
            document.getElementById('chartsRow').style.display = 'grid';
        } else if (data.status === 'failed') {
            resetUI();
            alert('计算失败，请检查参数后重试');
        } else {
            setTimeout(pollTask, 2000);
        }
    })
    .catch(() => setTimeout(pollTask, 3000));
}

function resetUI() {
    document.getElementById('btnCalc').disabled = false; document.getElementById('btnCalc').textContent = '计 算';
    document.getElementById('btnPause').disabled = true; document.getElementById('btnResume').disabled = true;
    document.getElementById('btnStop').disabled = true;
}

function showResults() {
    const p = collectParams();
    const capKw = p.battery_capacity_mw * 1000;
    const inv = p.unit_investment * capKw;
    document.getElementById('kpi_profit').textContent = '计算完成';
    document.getElementById('kpi_payback').textContent = '下载查看';
    document.getElementById('kpi_lifecycle').textContent = '下载查看';
    document.getElementById('kpi_life_years').textContent = '下载查看';
    document.getElementById('chartForecast').innerHTML = '<div style="text-align:center;padding:80px;color:#999;">📊 预测对比图请下载结果查看</div>';
    document.getElementById('chartMonthly').innerHTML = '<div style="text-align:center;padding:80px;color:#999;">📊 月度收益图请下载结果查看</div>';
}
</script>
{% endblock %}
