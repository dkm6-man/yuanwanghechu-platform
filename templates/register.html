{% extends "base.html" %}
{% block title %}用户注册 - 源网荷储一体化计算平台{% endblock %}
{% block content %}
<div class="form-container">
    <h2 class="form-title">用户注册</h2>
    <p class="form-subtitle">手机号即账号，短信验证码注册</p>
    
    {% if errors %}
    <div class="form-error">
        {% for err in errors %}
        <p>⚠ {{ err }}</p>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('register') }}" onsubmit="return checkForm(this)">
        <div class="form-group">
            <label for="phone">手机号</label>
            <div class="input-with-btn">
                <input type="tel" id="phone" name="phone" 
                       value="{{ phone or '' }}"
                       placeholder="请输入11位手机号" 
                       pattern="[0-9]{11}" maxlength="11" required autofocus>
                <button type="button" class="btn-send-code" id="btnSendCode" onclick="sendCode()">获取验证码</button>
            </div>
        </div>
        
        <div class="form-group">
            <label for="verify_code">短信验证码</label>
            <input type="text" id="verify_code" name="verify_code" 
                   placeholder="请输入6位验证码" maxlength="6" required>
            <div id="codeHint" style="display:none;margin-top:6px;padding:8px 12px;background:#fff3e0;border-radius:6px;font-size:0.85rem;"></div>
        </div>
        
        <div class="form-group">
            <label for="password">设置密码</label>
            <input type="password" id="password" name="password" 
                   placeholder="请输入密码（至少6位）" 
                   minlength="6" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认密码</label>
            <input type="password" id="confirm_password" name="confirm_password" 
                   placeholder="请再次输入密码" required>
        </div>
        
        <div class="form-group">
            <label class="form-check">
                <input type="checkbox" name="agree" required>
                我已阅读并同意 <a href="{{ url_for('agreement') }}" target="_blank">《用户协议》</a>
            </label>
        </div>
        
        <button type="submit" class="btn-submit">注 册</button>
    </form>
    
    <p class="form-footer">
        已有账号？<a href="{{ url_for('login') }}">立即登录</a>
    </p>
</div>

<script>
let countdown = 0;
function sendCode() {
    const phone = document.getElementById('phone').value;
    if (phone.length !== 11) { alert('请输入正确的11位手机号'); return; }
    
    const btn = document.getElementById('btnSendCode');
    btn.disabled = true; countdown = 60;
    btn.textContent = countdown + 's后重发';
    let timer = setInterval(() => {
        countdown--;
        btn.textContent = countdown + 's后重发';
        if (countdown <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '获取验证码'; }
    }, 1000);
    
    fetch('/api/send-code', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({phone: phone})
    })
    .then(r => r.json())
    .then(data => {
        if (data.code) {
            const div = document.getElementById('codeHint');
            if (div) { div.innerHTML = '验证码: <b style="color:#e65100;font-size:1.2rem;">' + data.code + '</b>（5分钟有效）'; div.style.display='block'; }
        }
    });
}
</script>
{% endblock %}
