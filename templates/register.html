{% extends "base.html" %}
{% block title %}用户注册 - 源网荷储一体化计算平台{% endblock %}
{% block content %}
<div class="form-container">
    <h2 class="form-title">用户注册</h2>
    <p class="form-subtitle">手机号即账号，一步完成注册</p>
    
    {% if errors %}
    <div class="form-error">
        {% for err in errors %}
        <p>⚠ {{ err }}</p>
        {% endfor %}
    </div>
    {% endif %}
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="tel" id="phone" name="phone" 
                   value="{{ phone or '' }}"
                   placeholder="请输入11位手机号作为登录账号" 
                   pattern="[0-9]{11}" maxlength="11" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">设置密码</label>
            <input type="password" id="password" name="password" 
                   placeholder="请输入密码（至少6位）" 
                   minlength="6" required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">确认密码</label>
            <input type="password" id="confirm_password" name="confirm_password" 
                   placeholder="请再次输入密码" required>
        </div>
        
        <div class="form-group">
            <label class="form-check">
                <input type="checkbox" name="agree" required>
                我已阅读并同意 <a href="{{ url_for('agreement') }}" target="_blank">《用户协议》</a>
            </label>
        </div>
        
        <button type="submit" class="btn-submit">注 册</button>
    </form>
    
    <p class="form-footer">
        已有账号？<a href="{{ url_for('login') }}">立即登录</a>
    </p>
</div>
{% endblock %}
