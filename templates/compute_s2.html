{% extends "base.html" %}
{% block title %}电-荷-储协同优化 - 源网荷储一体化计算平台{% endblock %}
{% block content %}

<!-- ===== 数据文件 ===== -->
<div class="orig-section">
    <div class="orig-section-title">数据文件</div>
    <div class="orig-btn-row">
        <button class="orig-btn orig-btn-file2" onclick="alert('上传历史负荷')">上传历史负荷</button>
        <button class="orig-btn orig-btn-file2" onclick="alert('上传历史天气')">上传历史天气</button>
        <button class="orig-btn orig-btn-file2" onclick="alert('上传市场化电价')">上传市场化电价</button>
        <button class="orig-btn orig-btn-file2" onclick="alert('API获取天气开发中')">API获取天气</button>
        <button class="orig-btn orig-btn-file2" onclick="alert('输出文件夹')">输出文件夹</button>
        <button class="orig-btn orig-btn-file2" onclick="alert('数据状态')">显示数据状态</button>
    </div>
    <div class="orig-status-text" id="s2DataStatus">状态: 使用模拟数据</div>
</div>

<!-- ===== 技术及经济性参数 ===== -->
<div class="orig-section">
    <div class="orig-section-title">技术及经济性参数</div>
    <div class="orig-param-grid col3">
        <div class="orig-field"><label>电池容量(MW)</label><input type="number" id="s2_battery_capacity_mw" value="3" step="0.1"></div>
        <div class="orig-field"><label>单位投资(元/kW)</label><input type="number" id="s2_unit_investment" value="700" step="10"></div>
        <div class="orig-field"><label>年运维费(元)</label><input type="number" id="s2_annual_om_cost" value="42000" step="1000"></div>
        <div class="orig-field"><label>容量电价(元/kW·月)</label><input type="number" id="s2_capacity_price" value="30" step="1"></div>
        <div class="orig-field"><label>充电效率</label><input type="number" id="s2_charge_efficiency" value="0.95" step="0.01"></div>
        <div class="orig-field"><label>放电效率</label><input type="number" id="s2_discharge_efficiency" value="0.95" step="0.01"></div>
        <div class="orig-field"><label>放电深度DOD</label><input type="number" id="s2_dod" value="0.9" step="0.05"></div>
        <div class="orig-field"><label>循环次数</label><input type="number" id="s2_cycle_life" value="6000" step="100"></div>
        <div class="orig-field"><label>最大倍率C</label><input type="number" id="s2_max_c_rate" value="0.5" step="0.1"></div>
    </div>
</div>

<!-- ===== 绿电资源配置 ===== -->
<div class="orig-section" style="background:#e8fdf5;">
    <div class="orig-section-title" style="border-bottom-color:#b2dfdb;">绿电资源配置</div>
    <div class="orig-param-grid col3">
        <div class="orig-field"><label>光伏装机(MW)</label><input type="number" id="s2_pv_capacity_mw" value="45" step="1"></div>
        <div class="orig-field"><label>风电装机(MW)</label><input type="number" id="s2_wind_capacity_mw" value="10" step="1"></div>
        <div class="orig-field"><label>基准购电均价(元/度)</label><input type="number" id="s2_grid_avg_price" value="0.6" step="0.01"></div>
        <div class="orig-field"><label>城市</label><input type="text" id="s2_city" value="Beijing"></div>
        <div class="orig-field"><button class="orig-btn orig-btn-weather" id="btnFetchWeather">获取天气预报</button></div>
        <div class="orig-field"><span class="orig-status-text" id="weatherStatus" style="grid-column:span 2;">未获取预报</span></div>
    </div>
</div>

<!-- ===== 天气预报曲线 ===== -->
<div class="orig-section" id="weatherSection" style="display:none;">
    <div class="orig-section-title">
        未来5天天气预报曲线
        <button class="orig-btn orig-btn-file2" onclick="toggleWeather()" style="font-size:0.72rem;margin-left:10px;">▼ 折叠</button>
    </div>
    <div class="orig-chart-canvas" id="weatherChart" style="min-height:200px;"></div>
</div>

<!-- ===== 协同预测参数 ===== -->
<div class="orig-section">
    <div class="orig-section-title">电-荷-储协同预测参数</div>
    <div class="orig-param-grid col4">
        <div class="orig-field"><label>训练集时长(小时)</label><input type="number" id="s2_train_hours" value="336"></div>
        <div class="orig-field"><label>微调间隔(小时)</label><input type="number" id="s2_ft_interval" value="2"></div>
        <div class="orig-field"><label>仿真时长(小时)</label><input type="number" id="s2_sim_hours" value="8760"></div>
        <div class="orig-field"><label>开始时间(小时)</label><input type="number" id="s2_start_hour" value="0"></div>
    </div>
</div>

<!-- ===== 控制按钮 ===== -->
<div class="orig-section">
    <div class="orig-ctrl-row">
        <div class="orig-ctrl-btns">
            <button class="orig-btn orig-btn-go" id="s2BtnCalc" onclick="s2StartCompute()">计 算</button>
            <button class="orig-btn orig-btn-pause" id="s2BtnPause" disabled>暂停</button>
            <button class="orig-btn orig-btn-resume" id="s2BtnResume" disabled>继续</button>
            <button class="orig-btn orig-btn-stop" id="s2BtnStop" disabled>结束</button>
        </div>
        <div class="orig-progress-wrap">
            <div class="orig-progress"><div class="orig-progress-fill" id="s2ProgFill"></div></div>
            <span class="orig-progress-text" id="s2ProgText">就绪</span>
        </div>
    </div>
</div>

<!-- ===== 结果输出 ===== -->
<div class="orig-section">
    <div class="orig-section-title">结果输出</div>
    
    <!-- 经济指标 -->
    <div class="orig-kpi-row col5">
        <div class="orig-kpi"><span class="orig-kpi-label">储能套利(元)</span><span class="orig-kpi-val" id="s2kpi_elec">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">需量节省(元)</span><span class="orig-kpi-val" id="s2kpi_cap">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">购电节省(元)</span><span class="orig-kpi-val" id="s2kpi_purchase">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">总收益(元)</span><span class="orig-kpi-val" id="s2kpi_total">--</span></div>
        <div class="orig-kpi"><span class="orig-kpi-label">回收期(年)</span><span class="orig-kpi-val" id="s2kpi_payback">--</span></div>
    </div>
    
    <!-- 结果下载 -->
    <div class="orig-download" id="s2downloadArea" style="display:none;margin-bottom:12px;">
        <a id="s2downloadLink" href="#" class="orig-btn orig-btn-go">📥 下载计算结果</a>
    </div>
    
    <!-- 图表区 -->
    <div class="orig-charts-row" id="s2chartsRow" style="display:none;">
        <div class="orig-chart-box">
            <div class="orig-chart-header"><span>负荷预测对比</span></div>
            <div class="orig-chart-canvas" id="s2chartLoad"></div>
        </div>
        <div class="orig-chart-box">
            <div class="orig-chart-header"><span>电价预测对比</span></div>
            <div class="orig-chart-canvas" id="s2chartPrice"></div>
        </div>
        <div class="orig-chart-box" style="grid-column:1/-1;">
            <div class="orig-chart-header"><span>电源供给结构</span></div>
            <div class="orig-chart-canvas" id="s2chartSupply"></div>
        </div>
    </div>
</div>

<style>
.orig-btn-file2 { background: #bbdefb; color: #1565c0; font-weight: 600; }
.orig-btn-weather { background: #ffb74d; color: #e65100; font-weight: 600; }
.orig-section[style*="e8fdf5"] .orig-field input { background: #fff; }
.orig-status-text { font-size: 0.78rem; color: #f44336; padding: 4px 0; }
.orig-kpi-row.col5 { grid-template-columns: repeat(5, 1fr); }
.orig-chart-box:nth-child(3) { min-height: 200px; }
@media (max-width: 1000px) { .orig-kpi-row.col5 { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .orig-kpi-row.col5 { grid-template-columns: repeat(2, 1fr); } }
</style>

<script>
let s2taskId = null;

function toggleWeather() {
    const ws = document.getElementById('weatherSection');
    ws.style.display = ws.style.display === 'none' ? 'block' : 'none';
}

function s2CollectParams() {
    const ids = ['battery_capacity_mw','unit_investment','annual_om_cost','capacity_price',
        'charge_efficiency','discharge_efficiency','dod','cycle_life','max_c_rate',
        'pv_capacity_mw','wind_capacity_mw','grid_avg_price','city',
        'train_hours','ft_interval','sim_hours','start_hour'];
    const p = {};
    ids.forEach(id => {
        const el = document.getElementById('s2_' + id);
        if (!el) return;
        const v = el.value;
        p[id] = (id === 'city') ? v : (+v || 0);
    });
    return p;
}

function s2StartCompute() {
    const btn = document.getElementById('s2BtnCalc');
    btn.disabled = true; btn.textContent = '计算中...';
    document.getElementById('s2BtnPause').disabled = false;
    document.getElementById('s2BtnStop').disabled = false;
    document.getElementById('s2ProgFill').style.width = '2%';
    document.getElementById('s2ProgText').textContent = '启动中...';
    document.getElementById('s2downloadArea').style.display = 'none';
    ['s2kpi_elec','s2kpi_cap','s2kpi_purchase','s2kpi_total','s2kpi_payback'].forEach(id => document.getElementById(id).textContent = '--');

    fetch('/api/compute/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task_type: 's2', params: s2CollectParams()})
    })
    .then(r => r.json())
    .then(data => {
        if (data.error) { alert('失败: ' + data.error); s2ResetUI(); return; }
        s2taskId = data.task_id;
        s2PollTask();
    })
    .catch(e => { alert('请求失败: ' + e); s2ResetUI(); });
}

function s2PollTask() {
    if (!s2taskId) return;
    fetch('/api/task/' + s2taskId + '/status')
    .then(r => r.json())
    .then(data => {
        document.getElementById('s2ProgFill').style.width = (data.progress || 0) + '%';
        document.getElementById('s2ProgText').textContent = 
            data.status === 'running' ? '计算中...' + (data.progress||0) + '%' :
            data.status === 'completed' ? '完成' : data.status === 'failed' ? '失败' : '等待中';
        
        if (data.status === 'completed') {
            s2ResetUI();
            document.getElementById('s2downloadArea').style.display = 'block';
            document.getElementById('s2downloadLink').href = '/api/task/' + s2taskId + '/download';
            document.getElementById('s2chartsRow').style.display = 'grid';
            ['s2kpi_elec','s2kpi_cap','s2kpi_purchase','s2kpi_total','s2kpi_payback'].forEach(id => document.getElementById(id).textContent = '计算结果');
            ['s2chartLoad','s2chartPrice','s2chartSupply'].forEach(id => {
                document.getElementById(id).innerHTML = '<div style="text-align:center;padding:80px;color:#999;">📊 详细图表请下载结果查看</div>';
            });
        } else if (data.status === 'failed') {
            s2ResetUI();
            alert('计算失败，请检查参数后重试');
        } else {
            setTimeout(s2PollTask, 2000);
        }
    })
    .catch(() => setTimeout(s2PollTask, 3000));
}

function s2ResetUI() {
    document.getElementById('s2BtnCalc').disabled = false; document.getElementById('s2BtnCalc').textContent = '计 算';
    document.getElementById('s2BtnPause').disabled = true; document.getElementById('s2BtnResume').disabled = true;
    document.getElementById('s2BtnStop').disabled = true;
}
</script>
{% endblock %}
